<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ZAMANI SHELTERS</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

:root{
--navy:#081c44;
--navy2:#102b63;
--blue:#2563eb;
--bg:#edf3ff;
--white:#ffffff;
--text:#102040;
--shadow:0 10px 35px rgba(0,0,0,0.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

header{
background:linear-gradient(135deg,var(--navy),var(--navy2));
padding:1.5rem 1rem;
text-align:center;
color:white;
box-shadow:var(--shadow);
}

header h1{
margin-bottom:10px;
}

header p{
opacity:0.9;
}

nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:1rem;
}

nav button{
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
background:white;
color:var(--navy);
}

.container{
max-width:1000px;
margin:auto;
padding:1rem;
}

.card{
background:white;
border-radius:25px;
padding:1.5rem;
margin-bottom:1.5rem;
box-shadow:var(--shadow);
}

input,
textarea,
select{
width:100%;
padding:14px;
border-radius:15px;
border:1px solid #dbe4ff;
background:#f7faff;
margin-bottom:1rem;
}

textarea{
resize:none;
height:120px;
}

.primary-btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-weight:700;
background:linear-gradient(135deg,var(--navy),var(--navy2));
color:white;
cursor:pointer;
}

.upload-box{
border:2px dashed var(--blue);
padding:2rem;
text-align:center;
border-radius:20px;
cursor:pointer;
background:#f4f7ff;
font-weight:700;
color:var(--navy);
}

.preview-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:1rem;
}

.preview-grid img{
width:100%;
height:140px;
object-fit:cover;
border-radius:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:1rem;
}

.property-card{
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:var(--shadow);
}

.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.slider img{
width:100%;
height:240px;
object-fit:cover;
flex-shrink:0;
scroll-snap-align:center;
}

.property-content{
padding:1rem;
}

.price{
font-size:1.5rem;
font-weight:800;
color:var(--navy);
margin:10px 0;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
background:#2563eb;
color:white;
font-size:0.8rem;
font-weight:700;
margin-bottom:10px;
}

.admin-stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:1rem;
}

.stat-box{
background:#f4f7ff;
padding:1rem;
border-radius:18px;
text-align:center;
}

.stat-box h2{
color:var(--navy);
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:14px 20px;
border-radius:999px;
opacity:0;
transition:0.3s;
z-index:999;
}

.toast.show{
opacity:1;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<h1>
🏠 ZAMANI SHELTERS
</h1>

<p>
Powered by Pi
</p>

<button
id="loginBtn"
class="primary-btn"
style="margin-top:1rem;max-width:300px;"
>
Login With Pi
</button>

<nav>

<button onclick="showPage('home')">
Home
</button>

<button
id="vendorNav"
class="hidden"
onclick="showPage('vendor')"
>
Vendor Dashboard
</button>

<button
id="adminNav"
class="hidden"
onclick="showPage('admin')"
>
Admin Dashboard
</button>

</nav>

</header>

<div class="container">

<!-- HOME -->

<section id="homePage">

<div class="card">

<h2>
Luxury Property Listings
</h2>

<div
id="propertyContainer"
class="grid"
></div>

</div>

</section>

<!-- VENDOR -->

<section
id="vendorPage"
class="hidden"
>

<div class="card">

<h2>
Post Property
</h2>

<input
type="text"
id="title"
placeholder="Property Title"
/>

<textarea
id="desc"
placeholder="Property Description"
></textarea>

<input
type="number"
id="price"
placeholder="Price In Pi"
/>

<select id="type">

<option value="sale">
Sale
</option>

<option value="rent">
Rent
</option>

</select>

<div
class="upload-box"
onclick="openGallery()"
>
📸 Upload Property Images
</div>

<input
type="file"
id="galleryInput"
multiple
accept="image/*"
style="display:none"
/>

<div
id="previewGrid"
class="preview-grid"
></div>

<br>

<button
class="primary-btn"
onclick="createListing()"
>
Create Listing
</button>

</div>

<div class="card">

<h2>
Your Listings
</h2>

<div
id="vendorListings"
class="grid"
></div>

</div>

</section>

<!-- ADMIN -->

<section
id="adminPage"
class="hidden"
>

<div class="card">

<h2>
Admin Dashboard
</h2>

<div class="admin-stats">

<div class="stat-box">
<h2 id="totalListings">0</h2>
<p>Total Listings</p>
</div>

<div class="stat-box">
<h2 id="pendingCount">0</h2>
<p>Pending</p>
</div>

<div class="stat-box">
<h2 id="approvedCount">0</h2>
<p>Approved</p>
</div>

</div>

</div>

<div class="card">

<h2>
Pending Approvals
</h2>

<div
id="pendingListings"
class="grid"
></div>

</div>

<div class="card">

<h2>
All Transactions
</h2>

<div
id="transactions"
></div>

</div>

</section>

</div>

<div
id="toast"
class="toast"
></div>

<script>

Pi.init({
version:"2.0",
sandbox:false
});

let currentUser = null;
let selectedImages = [];

const ADMIN_USERS = [
"mairahs"
];

function toast(msg){

const t =
document.getElementById("toast");

t.innerText = msg;

t.classList.add("show");

setTimeout(()=>{

t.classList.remove("show");

},3000);

}

function showPage(page){

document
.getElementById("homePage")
.classList.add("hidden");

document
.getElementById("vendorPage")
.classList.add("hidden");

document
.getElementById("adminPage")
.classList.add("hidden");

if(page === "home"){

document
.getElementById("homePage")
.classList.remove("hidden");

}

if(page === "vendor"){

document
.getElementById("vendorPage")
.classList.remove("hidden");

}

if(page === "admin"){

document
.getElementById("adminPage")
.classList.remove("hidden");

}

}

document
.getElementById("loginBtn")
.addEventListener("click",
async ()=>{

try{

const auth =
await Pi.authenticate(
['username','payments'],
()=>{}
);

currentUser = auth.user;

alert(currentUser.username);

document
.getElementById("vendorNav")
.classList.remove("hidden");

if(
ADMIN_USERS.includes(
currentUser.username
)
){

document
.getElementById("adminNav")
.classList.remove("hidden");

}

loadVendorListings();

}catch(e){

toast("Login Failed");

}

});

function openGallery(){

document
.getElementById("galleryInput")
.click();

}

document
.getElementById("galleryInput")
.addEventListener("change",e=>{

const files = [...e.target.files];

selectedImages = [];

const preview =
document.getElementById(
"previewGrid"
);

preview.innerHTML = "";

files.forEach(file=>{

const reader =
new FileReader();

reader.onload = ev=>{

selectedImages.push(
ev.target.result
);

const img =
document.createElement("img");

img.src =
ev.target.result;

preview.appendChild(img);

};

reader.readAsDataURL(file);

});

});

function createListing(){

if(!currentUser){

toast("Login First");

return;

}

const title =
document.getElementById("title").value;

const desc =
document.getElementById("desc").value;

const price =
document.getElementById("price").value;

const type =
document.getElementById("type").value;

if(
!title ||
!desc ||
!price
){

toast("Complete all fields");

return;

}

const listing = {

id:Date.now(),

title,

desc,

price,

type,

vendor:
currentUser.username,

images:
selectedImages.length
?
selectedImages
:
[
"https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=1200"
],

status:"pending",

createdAt:
new Date().toLocaleString()

};

let listings =
JSON.parse(
localStorage.getItem(
"zamaniListings"
)
) || [];

listings.unshift(listing);

localStorage.setItem(
"zamaniListings",
JSON.stringify(listings)
);

toast("Listing Submitted");

document
.getElementById("title")
.value = "";

document
.getElementById("desc")
.value = "";

document
.getElementById("price")
.value = "";

document
.getElementById("previewGrid")
.innerHTML = "";

selectedImages = [];

loadVendorListings();
loadPendingListings();
updateStats();

}

function loadListings(){

const listings =
JSON.parse(
localStorage.getItem(
"zamaniListings"
)
) || [];

const approved =
listings.filter(
x=>x.status==="approved"
);

const container =
document.getElementById(
"propertyContainer"
);

container.innerHTML =
approved.map(item=>`

<div class="property-card">

<div class="slider">

${item.images.map(img=>`

<img src="${img}">

`).join("")}

</div>

<div class="property-content">

<span class="badge">
${item.type.toUpperCase()}
</span>

<h3>
${item.title}
</h3>

<p>
${item.desc}
</p>

<div class="price">
${item.price} Pi
</div>

<p>
Vendor:
<b>@${item.vendor}</b>
</p>

<br>

<button
class="primary-btn"
onclick="buyProperty(${item.id})"
>
${item.type==="sale"
?
"Buy Property"
:
"Rent Property"
}
</button>

</div>

</div>

`).join("");

}

function loadVendorListings(){

if(!currentUser) return;

const listings =
JSON.parse(
localStorage.getItem(
"zamaniListings"
)
) || [];

const mine =
listings.filter(
x=>x.vendor === currentUser.username
);

const container =
document.getElementById(
"vendorListings"
);

container.innerHTML =
mine.map(item=>`

<div class="property-card">

<img
src="${item.images[0]}"
style="
width:100%;
height:220px;
object-fit:cover;
"
>

<div class="property-content">

<h3>
${item.title}
</h3>

<div class="price">
${item.price} Pi
</div>

<p>
Status:
<b>${item.status}</b>
</p>

</div>

</div>

`).join("");

}

function loadPendingListings(){

const listings =
JSON.parse(
localStorage.getItem(
"zamaniListings"
)
) || [];

const pending =
listings.filter(
x=>x.status==="pending"
);

const container =
document.getElementById(
"pendingListings"
);

container.innerHTML =
pending.map(item=>`

<div class="property-card">

<img
src="${item.images[0]}"
style="
width:100%;
height:220px;
object-fit:cover;
"
>

<div class="property-content">

<h3>
${item.title}
</h3>

<p>
${item.desc}
</p>

<div class="price">
${item.price} Pi
</div>

<p>
Vendor:
<b>@${item.vendor}</b>
</p>

<br>

<button
class="primary-btn"
onclick="approveListing(${item.id})"
>
Approve Listing
</button>

</div>

</div>

`).join("");

}

function approveListing(id){

let listings =
JSON.parse(
localStorage.getItem(
"zamaniListings"
)
) || [];

listings =
listings.map(item=>{

if(item.id === id){

item.status = "approved";

}

return item;

});

localStorage.setItem(
"zamaniListings",
JSON.stringify(listings)
);

toast("Listing Approved");

loadListings();
loadPendingListings();
updateStats();

}

async function buyProperty(id){

const listings =
JSON.parse(
localStorage.getItem(
"zamaniListings"
)
) || [];

const property =
listings.find(
x=>x.id===id
);

if(!property) return;

try{

await Pi.createPayment({

amount:
Number(property.price),

memo:
`Payment for ${property.title}`,

metadata:{
propertyId:id
}

},{

onReadyForServerApproval:
()=>{

toast("Payment Started");

},

onReadyForServerCompletion:
()=>{

saveTransaction(property);

toast("Payment Successful");

},

onCancel:
()=>{

toast("Payment Cancelled");

},

onError:
()=>{

toast("Payment Failed");

}

});

}catch(e){

toast("Payment Error");

}

}

function saveTransaction(property){

let txs =
JSON.parse(
localStorage.getItem(
"zamaniTransactions"
)
) || [];

txs.unshift({

title:
property.title,

amount:
property.price,

buyer:
currentUser.username,

date:
new Date().toLocaleString()

});

localStorage.setItem(
"zamaniTransactions",
JSON.stringify(txs)
);

loadTransactions();

}

function loadTransactions(){

const txs =
JSON.parse(
localStorage.getItem(
"zamaniTransactions"
)
) || [];

const container =
document.getElementById(
"transactions"
);

container.innerHTML =
txs.map(tx=>`

<div
style="
padding:1rem;
border-bottom:1px solid #eee;
"
>

<b>
${tx.title}
</b>

<br>

${tx.amount} Pi

<br>

Buyer:
@${tx.buyer}

<br>

${tx.date}

</div>

`).join("");

}

function updateStats(){

const listings =
JSON.parse(
localStorage.getItem(
"zamaniListings"
)
) || [];

document
.getElementById("totalListings")
.innerText =
listings.length;

document
.getElementById("pendingCount")
.innerText =
listings.filter(
x=>x.status==="pending"
).length;

document
.getElementById("approvedCount")
.innerText =
listings.filter(
x=>x.status==="approved"
).length;

}

window.onload = ()=>{

loadListings();
loadPendingListings();
loadTransactions();
updateStats();

};

</script>

</body>
</html>
